<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Pelanggan</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Form Tambah Data Pelanggan</h2>

<form>

<div class="mb-3">
<label class="form-label">No. ID</label>
<input type="text" class="form-control" placeholder="Masukkan ID">
</div>

<div class="mb-3">
<label class="form-label">Nama Pelanggan</label>
<input type="text" class="form-control" placeholder="Masukkan Nama Pelanggan">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Masukkan Email">
</div>

<div class="mb-3">
<label class="form-label">Tanggal Lahir</label>
<input type="date" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Alamat</label>
<textarea class="form-control" rows="3" placeholder="Masukkan Alamat"></textarea>
</div>

<button type="submit" class="btn btn-primary">Simpan</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</form>

</div>

</body>
</html>
